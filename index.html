<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweets - Catalogo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo">Sweets</div>
            <nav id="main-nav">
                <button id="public-nav" class="btn-outline" onclick="app.toggleAdminModal(true)">Area Riservata</button>
            </nav>
        </div>
    </header>

    <!-- Inizialmente nascosto con stile inline -->
    <div class="container" id="controls-bar" style="display: none !important; margin: 20px auto; gap: 10px; flex-wrap: wrap;">
        <button onclick="app.renderCatalog()">Catalogo</button>
        <div class="dropdown">
            <button class="dropbtn">Tipologia</button>
            <div id="dropdown-type" class="dropdown-content"></div>
        </div>
        <div class="dropdown">
            <button class="dropbtn">Confezione</button>
            <div id="dropdown-packtype" class="dropdown-content"></div>
        </div>
        <button onclick="app.switchAdminView('management')">Gestisci</button>
        <button onclick="app.handleLogout()">Esci</button>
        <button onclick="app.exportPDF('download')">PDF</button>
    </div>

    <main class="container" id="catalog-wrapper" style="display: none !important;">
        <div id="main-content"></div>
    </main>

    <section id="admin-panel" class="container" style="display: none !important;">
        <div class="card"><table id="admin-table"><thead><tr><th>ID</th><th>Nome</th><th>Azioni</th></tr></thead><tbody id="admin-table-body"></tbody></table></div>
    </section>

    <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:20px; border-radius:8px;">
            <form onsubmit="app.handleLogin(event)">
                <input type="text" id="username" placeholder="User" required><br>
                <input type="password" id="password" placeholder="Pass" required><br>
                <button type="submit">Accedi</button>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
